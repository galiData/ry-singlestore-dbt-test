name: dbt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DBT_SINGLESTORE_HOST: ${{ secrets.DBT_SINGLESTORE_HOST }}
  DBT_SINGLESTORE_PORT: ${{ secrets.DBT_SINGLESTORE_PORT }}
  DBT_SINGLESTORE_USER: ${{ secrets.DBT_SINGLESTORE_USER }}
  DBT_SINGLESTORE_PASSWORD: ${{ secrets.DBT_SINGLESTORE_PASSWORD }}
  DBT_SINGLESTORE_DATABASE: ${{ secrets.DBT_SINGLESTORE_DATABASE }}
  DBT_SINGLESTORE_SCHEMA: ${{ secrets.DBT_SINGLESTORE_SCHEMA }}

jobs:
  # ── PR: compile + test only, no writes to the database ──────────────────────
  ci:
    name: CI (PR check)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        run: dbt deps --profiles-dir .

      - name: dbt compile
        run: dbt compile --profiles-dir .

      - name: dbt test (continue on model failures)
        run: dbt test --profiles-dir . --no-fail-fast
        # Exit code will be non-zero if any test fails — PR will be blocked.
        # Individual passing tests still run thanks to --no-fail-fast.

  # ── Main: full run → test → docs → publish ──────────────────────────────────
  cd:
    name: CD (deploy to SingleStore)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        run: dbt deps --profiles-dir .

      - name: dbt run (continue past broken models)
        run: dbt run --profiles-dir . --no-fail-fast

      - name: dbt test (continue past broken tests)
        run: dbt test --profiles-dir . --no-fail-fast
        # Failing tests do NOT block the docs publish step below.
        # The overall job will still report as failed so you get notified.
        continue-on-error: true

      - name: dbt docs generate
        run: dbt docs generate --profiles-dir .

      - name: Upload docs to S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync docs to S3 bucket
        run: |
          aws s3 sync target/ s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/ \
            --include "index.html" \
            --include "manifest.json" \
            --include "catalog.json" \
            --delete \
            --cache-control "max-age=300"

      - name: Print docs URL
        run: |
          echo "📊 dbt docs: http://${{ secrets.DBT_DOCS_S3_BUCKET }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"
