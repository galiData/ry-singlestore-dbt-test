name: dbt

on:
  push:
    branches: [main]
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "tests/**"
      - "assets/**"
      - "dbt_project.yml"
      - "packages.yml"
      - "profiles.yml"
      - "requirements.txt"
      - ".github/workflows/dbt.yml"
  pull_request:
    branches: [main]
    paths:
      - "models/**"
      - "macros/**"
      - "seeds/**"
      - "snapshots/**"
      - "tests/**"
      - "assets/**"
      - "dbt_project.yml"
      - "packages.yml"
      - "profiles.yml"
      - "requirements.txt"
      - ".github/workflows/dbt.yml"

env:
  DBT_SINGLESTORE_HOST: ${{ secrets.DBT_SINGLESTORE_HOST }}
  DBT_SINGLESTORE_PORT: ${{ secrets.DBT_SINGLESTORE_PORT }}
  DBT_SINGLESTORE_USER: ${{ secrets.DBT_SINGLESTORE_USER }}
  DBT_SINGLESTORE_PASSWORD: ${{ secrets.DBT_SINGLESTORE_PASSWORD }}
  DBT_SINGLESTORE_DATABASE: ${{ secrets.DBT_SINGLESTORE_DATABASE }}
  DBT_SINGLESTORE_SCHEMA: ${{ secrets.DBT_SINGLESTORE_SCHEMA }}
  DBT_DOCS_S3_BUCKET: ${{ secrets.DBT_DOCS_S3_BUCKET }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── PR: compile + test only modified models, no writes ──────────────────────
  ci:
    name: CI (PR check)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        run: dbt deps --profiles-dir .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download previous manifest for state comparison
        run: |
          mkdir -p state
          aws s3 cp s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/manifest.json state/manifest.json || echo "No previous manifest found — will run all models"

      - name: dbt compile
        run: dbt compile --profiles-dir .

      - name: dbt test (modified models only, continue on failures)
        run: |
          if [ -f state/manifest.json ]; then
            echo "Running tests on modified models only"
            dbt test --profiles-dir . --no-fail-fast \
              --select state:modified+ \
              --state ./state
          else
            echo "No previous state — running all tests"
            dbt test --profiles-dir . --no-fail-fast
          fi

  # ── Main: run modified → test → docs → publish ──────────────────────────────
  cd:
    name: CD (deploy to SingleStore)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: dbt deps
        run: dbt deps --profiles-dir .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download previous manifest for state comparison
        run: |
          mkdir -p state
          aws s3 cp s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/manifest.json state/manifest.json || echo "No previous manifest found — will run all models"

      - name: dbt run (modified models + downstream, continue past broken)
        run: |
          if [ -f state/manifest.json ]; then
            echo "Running modified models and their downstream dependencies"
            dbt run --profiles-dir . --no-fail-fast \
              --select state:modified+ \
              --state ./state
          else
            echo "No previous state — running all models"
            dbt run --profiles-dir . --no-fail-fast
          fi

      - name: dbt test (modified models only, continue past broken)
        run: |
          if [ -f state/manifest.json ]; then
            dbt test --profiles-dir . --no-fail-fast \
              --select state:modified+ \
              --state ./state
          else
            dbt test --profiles-dir . --no-fail-fast
          fi
        continue-on-error: true

      - name: dbt docs generate
        run: dbt docs generate --profiles-dir .

      - name: Inject brand CSS and logo replacement into docs
        env:
          S3_BASE_URL: "http://${{ secrets.DBT_DOCS_S3_BUCKET }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"
        run: |
          python3 - <<'EOF'
          import os

          s3_base_url = os.environ["S3_BASE_URL"]

          with open("target/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Force light mode meta tag — prevents browser Auto Dark Mode
          meta_tag = '<meta name="color-scheme" content="light">'

          css_tag = '<link rel="stylesheet" href="custom.css">'

          js_tag = """<script>
          (function() {
            var LOGO = "{s3_base_url}/images/ry-logo.png";
            function replaceLogo() {{
              var logo = document.querySelector("img.logo");
              if (logo && logo.src.indexOf("ry-logo") === -1) {{
                logo.src = LOGO;
                logo.alt = "Rocket Youth";
                logo.style.height = "36px";
                logo.style.width = "auto";
                logo.style.maxWidth = "160px";
              }}
            }}
            var obs = new MutationObserver(replaceLogo);
            obs.observe(document.body, {{ childList: true, subtree: true, attributes: true, attributeFilter: ["src"] }});
            replaceLogo();
            var attempts = 0;
            var poll = setInterval(function() {{
              replaceLogo();
              if (++attempts > 20) clearInterval(poll);
            }}, 300);
          }})();
          </script>""".replace("{s3_base_url}", s3_base_url)

          # Substitute S3 URL placeholder in CSS (copied from assets/ into target/)
          import shutil
          shutil.copy("assets/custom.css", "target/custom.css")
          with open("target/custom.css", "r") as f:
              css = f.read()
          css = css.replace("__S3_BASE_URL__", s3_base_url)
          with open("target/custom.css", "w") as f:
              f.write(css)

          html = html.replace("<head>", "<head>" + meta_tag, 1)
          html = html.replace("</head>", css_tag + "</head>", 1)
          html = html.replace("</body>", js_tag + "</body>", 1)

          with open("target/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print(f"Injected: meta color-scheme, CSS link, logo JS. S3 URL: {s3_base_url}")
          EOF

      - name: Sync docs, manifest, and assets to S3
        run: |
          # 1. Upload images (never changes often)
          aws s3 sync assets/images/ s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/images/ \
            --cache-control "max-age=86400"

          # 2. Upload processed CSS (URL-substituted version from target/)
          aws s3 cp target/custom.css s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/custom.css \
            --cache-control "no-cache"

          # 3. Upload dbt doc files
          aws s3 cp target/index.html s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/index.html \
            --cache-control "no-cache"
          aws s3 cp target/manifest.json s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/manifest.json \
            --cache-control "max-age=300"
          aws s3 cp target/catalog.json s3://${{ secrets.DBT_DOCS_S3_BUCKET }}/catalog.json \
            --cache-control "max-age=300"

      - name: Print docs URL
        run: echo "dbt docs live at http://${{ secrets.DBT_DOCS_S3_BUCKET }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"
