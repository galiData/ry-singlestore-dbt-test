name: ry_singlestore
version: "1.0.0"
config-version: 2

profile: ry_singlestore

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

vars:
  # Global variables — override per environment if needed
  start_date: "2024-01-01"

models:
  ry_singlestore:
    staging:
      +materialized: view
      +tags: ["bronze"]

    intermediate:
      +materialized: table
      +tags: ["silver"]
      accounting:
        +tags: ["silver", "accounting"]
      marketing:
        +tags: ["silver", "marketing"]
      growth:
        +tags: ["silver", "growth"]
      hr:
        +tags: ["silver", "hr"]

    marts:
      +materialized: table
      +tags: ["gold"]
      accounting:
        +tags: ["gold", "accounting"]
      marketing:
        +tags: ["gold", "marketing"]
      growth:
        +tags: ["gold", "growth"]
      hr:
        +tags: ["gold", "hr"]
      analytics:
        +tags: ["gold", "analytics"]
