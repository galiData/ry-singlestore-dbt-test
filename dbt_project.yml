name: ry_singlestore
version: "1.0.0"
config-version: 2

# Project metadata shown in dbt docs
description: >
  Rocket Youth Analytics dbt project. Transforms raw operational data from
  GoHighLevel, Jackrabbit, QuickBooks, NetSuite, UKG, iClassPro, and 15+
  other source systems into analytics-ready models in SingleStore.
  Maintained by the Rocket Youth Analytics team.

profile: ry_singlestore

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

vars:
  # Global variables — override per environment if needed
  start_date: "2024-01-01"

models:
  ry_singlestore:
    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: ephemeral

    marts:
      +materialized: table
      core:
        +schema: core
